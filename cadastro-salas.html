<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineControl - Cadastro de Salas</title>
  <meta name="description" content="Cadastro e gerenciamento de salas no sistema CineControl.">
  <link rel="stylesheet" href="css/bootstrap.min.css">
  <link rel="stylesheet" href="css/cinecontrol.css">
</head>
<body>

  <!-- Film strip decorations -->
  <div class="film-strip-top"></div>
  <div class="film-strip-bottom"></div>
  <div class="curtain-decoration"></div>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html">
        <span class="brand-icon">🎬</span> CineControl
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><span class="navbar-toggler-icon"></span></button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="cadastro-filmes.html">Filmes</a></li>
          <li class="nav-item"><a class="nav-link active" href="cadastro-salas.html">Salas</a></li>
          <li class="nav-item"><a class="nav-link" href="cadastro-sessoes.html">Sessões</a></li>
          <li class="nav-item"><a class="nav-link" href="venda-ingressos.html">Ingressos</a></li>
          <li class="nav-item"><a class="nav-link" href="sessoes.html">Em Cartaz</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container main-content">
    <div class="page-header">
      <h4><span class="page-icon">🏛️</span> Cadastro de Salas</h4>
    </div>
    <hr class="page-header-line">

    <div id="mensagem"></div>

    <div class="row">
      <div class="col-md-3"></div>
      <div class="col-md-6">
        <div class="form-card animate-in">
          <form id="formSala">
            <div class="form-floating mb-3">
              <input type="text" class="form-control" id="nomeSala" placeholder="Nome da Sala" required>
              <label for="nomeSala">Nome da Sala</label>
            </div>
            <div class="form-floating mb-3">
              <input type="number" class="form-control" id="capacidade" placeholder="Capacidade" required>
              <label for="capacidade">Capacidade</label>
            </div>
            <div class="form-floating mb-3">
              <select class="form-select" id="tipoSala" required>
                <option value="" selected disabled>Selecione</option>
                <option value="2D">2D</option>
                <option value="3D">3D</option>
                <option value="IMAX">IMAX</option>
              </select>
              <label for="tipoSala">Tipo</label>
            </div>
            <div class="d-grid gap-2">
              <button type="button" id="btnSalvarSala" class="btn btn-success">Salvar Sala</button>
            </div>
          </form>
        </div>
      </div>
      <div class="col-md-3"></div>
    </div>

    <div class="ticket-divider"></div>

    <div class="table-responsive animate-in">
      <table class="table table-hover" id="tabelaSalas">
        <thead>
          <tr>
            <th>#</th>
            <th>Nome</th>
            <th>Capacidade</th>
            <th>Tipo</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <script src="js/bootstrap.min.js"></script>
  <script src="js-app/salas.js"></script>
</body>
</html>
