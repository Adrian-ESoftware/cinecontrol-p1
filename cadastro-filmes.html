<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineControl - Cadastro de Filmes</title>
  <meta name="description" content="Cadastro e gerenciamento de filmes no sistema CineControl.">
  <link rel="stylesheet" href="css/bootstrap.min.css">
  <link rel="stylesheet" href="css/cinecontrol.css">
</head>
<body>

  <!-- Film strip decorations -->
  <div class="film-strip-top"></div>
  <div class="film-strip-bottom"></div>
  <div class="curtain-decoration"></div>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html">
        <span class="brand-icon">🎬</span> CineControl
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><span class="navbar-toggler-icon"></span></button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link active" href="cadastro-filmes.html">Filmes</a></li>
          <li class="nav-item"><a class="nav-link" href="cadastro-salas.html">Salas</a></li>
          <li class="nav-item"><a class="nav-link" href="cadastro-sessoes.html">Sessões</a></li>
          <li class="nav-item"><a class="nav-link" href="venda-ingressos.html">Ingressos</a></li>
          <li class="nav-item"><a class="nav-link" href="sessoes.html">Em Cartaz</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container main-content">
    <div class="page-header">
      <h4><span class="page-icon">🎞️</span> Cadastro de Filmes</h4>
    </div>
    <hr class="page-header-line">

    <div id="mensagem"></div>

    <div class="row">
      <div class="col-md-3"></div>
      <div class="col-md-6">
        <div class="form-card animate-in">
          <form id="formFilme">
            <div class="form-floating mb-3">
              <input type="text" class="form-control" id="titulo" placeholder="Título do filme" required>
              <label for="titulo">Título</label>
            </div>
            <div class="form-floating mb-3">
              <select class="form-select" id="genero" required>
                <option value="" selected disabled>Selecione</option>
                <option value="Ação">Ação</option>
                <option value="Comédia">Comédia</option>
                <option value="Drama">Drama</option>
                <option value="Terror">Terror</option>
                <option value="Animação">Animação</option>
                <option value="Ficção Científica">Ficção Científica</option>
                <option value="Romance">Romance</option>
              </select>
              <label for="genero">Gênero</label>
            </div>
            <div class="form-floating mb-3">
              <textarea class="form-control" id="descricao" placeholder="Descrição" rows="3" style="height: 100px;"></textarea>
              <label for="descricao">Descrição</label>
            </div>
            <div class="form-floating mb-3">
              <select class="form-select" id="classificacao" required>
                <option value="" selected disabled>Selecione</option>
                <option value="Livre">Livre</option>
                <option value="10 anos">10 anos</option>
                <option value="12 anos">12 anos</option>
                <option value="14 anos">14 anos</option>
                <option value="16 anos">16 anos</option>
                <option value="18 anos">18 anos</option>
              </select>
              <label for="classificacao">Classificação Indicativa</label>
            </div>
            <div class="form-floating mb-3">
              <input type="number" class="form-control" id="duracao" placeholder="em minutos" required>
              <label for="duracao">Duração (minutos)</label>
            </div>
            <div class="form-floating mb-3">
              <input type="date" class="form-control" id="dataEstreia" required>
              <label for="dataEstreia">Data de Estreia</label>
            </div>
            <div class="d-grid gap-2">
              <button type="button" id="btnSalvarFilme" class="btn btn-primary">Salvar Filme</button>
            </div>
          </form>
        </div>
      </div>
      <div class="col-md-3"></div>
    </div>

    <div class="ticket-divider"></div>

    <div class="table-responsive animate-in">
      <table class="table table-hover" id="tabelaFilmes">
        <thead>
          <tr>
            <th>#</th>
            <th>Título</th>
            <th>Gênero</th>
            <th>Classificação</th>
            <th>Duração</th>
            <th>Estreia</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <script src="js/bootstrap.min.js"></script>
  <script src="js-app/filmes.js"></script>
</body>
</html>
