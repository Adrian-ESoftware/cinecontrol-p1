<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineControl - Cadastro de Sessões</title>
  <meta name="description" content="Cadastro e gerenciamento de sessões no sistema CineControl.">
  <link rel="stylesheet" href="css/bootstrap.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      color: #e0e0e0;
    }
    .navbar { background: rgba(15, 12, 41, 0.95) !important; backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.08); box-shadow: 0 2px 20px rgba(0,0,0,0.3); }
    .navbar-brand { font-weight: 700; font-size: 1.4rem; background: linear-gradient(90deg, #f7971e, #ffd200); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 1px; }
    .nav-link { color: rgba(255,255,255,0.75) !important; transition: color 0.3s ease; font-weight: 500; }
    .nav-link:hover, .nav-link.active { color: #ffd200 !important; }
    .container { margin-top: 90px; }
    h4 { font-weight: 700; color: #ffd200; }
    hr { border-color: rgba(255,255,255,0.1); }
    .form-floating > .form-control, .form-floating > .form-select {
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); color: #e0e0e0; border-radius: 10px;
    }
    .form-floating > .form-control:focus, .form-floating > .form-select:focus {
      background: rgba(255,255,255,0.1); border-color: #f7971e; box-shadow: 0 0 0 0.2rem rgba(247,151,30,0.25); color: #fff;
    }
    .form-floating > label { color: rgba(255,255,255,0.5); }
    .form-select option { background: #1a1a2e; color: #e0e0e0; }
    .btn-primary {
      background: linear-gradient(135deg, #f7971e, #ffd200); border: none; color: #1a1a2e; font-weight: 700; border-radius: 10px; padding: 12px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .btn-primary:hover { transform: scale(1.02); box-shadow: 0 4px 20px rgba(247,151,30,0.4); color: #1a1a2e; background: linear-gradient(135deg, #f7971e, #ffd200); }
    .table { color: #e0e0e0; background: transparent; --bs-table-bg: transparent; --bs-table-color: #e0e0e0; --bs-table-hover-bg: rgba(255,255,255,0.06); --bs-table-hover-color: #fff; --bs-table-striped-bg: transparent; border-color: rgba(255,255,255,0.08); }
    .table thead { background: rgba(247,151,30,0.12); }
    .table thead th { color: #ffd200; font-weight: 600; border-bottom: 2px solid rgba(247,151,30,0.3); background: transparent; }
    .table tbody { background: rgba(255,255,255,0.03); }
    .table tbody tr { border-bottom: 1px solid rgba(255,255,255,0.08); transition: background 0.2s; }
    .table tbody tr:hover { background: rgba(247,151,30,0.08); }
    .table td, .table th { vertical-align: middle; border-color: rgba(255,255,255,0.08); }
    .table-responsive { background: rgba(0,0,0,0.2); border-radius: 12px; padding: 4px; border: 1px solid rgba(255,255,255,0.06); }
    .btn-danger { border-radius: 8px; font-weight: 600; }
    #mensagem { position: fixed; top: 80px; right: 20px; z-index: 1055; min-width: 280px; animation: fadeSlide 0.4s ease; }
    @keyframes fadeSlide { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html">🎬 CineControl</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><span class="navbar-toggler-icon"></span></button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="cadastro-filmes.html">Filmes</a></li>
          <li class="nav-item"><a class="nav-link" href="cadastro-salas.html">Salas</a></li>
          <li class="nav-item"><a class="nav-link active" href="cadastro-sessoes.html">Sessões</a></li>
          <li class="nav-item"><a class="nav-link" href="venda-ingressos.html">Venda de Ingressos</a></li>
          <li class="nav-item"><a class="nav-link" href="sessoes.html">Sessões Disponíveis</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container">
    <h4>🗓️ Cadastro de Sessões</h4>
    <hr>

    <div id="mensagem"></div>

    <div class="row">
      <div class="col-md-2"></div>
      <div class="col-md-8">
        <form id="formSessao">
          <div class="form-floating mb-3">
            <select class="form-select" id="selectFilme" required>
              <option value="" selected disabled>Selecione um filme</option>
            </select>
            <label for="selectFilme">Filme</label>
          </div>
          <div class="form-floating mb-3">
            <select class="form-select" id="selectSala" required>
              <option value="" selected disabled>Selecione uma sala</option>
            </select>
            <label for="selectSala">Sala</label>
          </div>
          <div class="form-floating mb-3">
            <input type="datetime-local" class="form-control" id="dataHora" required>
            <label for="dataHora">Data e Hora</label>
          </div>
          <div class="form-floating mb-3">
            <input type="number" class="form-control" id="preco" step="0.01" placeholder="Preço" required>
            <label for="preco">Preço (R$)</label>
          </div>
          <div class="form-floating mb-3">
            <select class="form-select" id="idioma" required>
              <option value="Dublado">Dublado</option>
              <option value="Legendado">Legendado</option>
            </select>
            <label for="idioma">Idioma</label>
          </div>
          <div class="form-floating mb-3">
            <select class="form-select" id="formato" required>
              <option value="2D">2D</option>
              <option value="3D">3D</option>
            </select>
            <label for="formato">Formato</label>
          </div>
          <div class="d-grid gap-2">
            <button type="button" id="btnSalvarSessao" class="btn btn-primary">Salvar Sessão</button>
          </div>
        </form>
      </div>
      <div class="col-md-2"></div>
    </div>

    <hr>

    <div class="table-responsive">
      <table class="table table-hover" id="tabelaSessoes">
        <thead>
          <tr>
            <th>#</th>
            <th>Filme</th>
            <th>Sala</th>
            <th>Data/Hora</th>
            <th>Preço</th>
            <th>Idioma</th>
            <th>Formato</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <script src="js/bootstrap.min.js"></script>
  <script src="js-app/sessoes.js"></script>
</body>
</html>
